name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (TypeScript + Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit --skipLibCheck
      - run: npm run lint

  backend:
    name: Backend (Syntax + Audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node -e "
          const fs = require('fs');
          const files = fs.readdirSync('src', { recursive: true }).filter(f => f.endsWith('.js'));
          let ok = true;
          for (const f of files) {
            try { require('child_process').execSync('node --check src/' + f, { stdio: 'pipe' }); }
            catch (e) { console.error('SYNTAX ERROR in src/' + f); ok = false; }
          }
          process.exit(ok ? 0 : 1);
        "
